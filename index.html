<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  text-align: center;
}

/* Container */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Card */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TEXT FIX */
h1 {
  font-size: 22px;
  lor: #222;   /* DARK TEXT */
}

p {
  color: #444;
}

/* Buttons */
button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.yes { background: #00c853; color: white; }
.no { background: #ff1744; color: white; position: relative; }

/* Image */
img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 14px;
  top: -20px;
  opacity: 0.9;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg);
  }
  100% {
    transform: translateY(110vh) rotate(720deg);
  }
}
@keyframes fall {
  to { transform: translateY(100vh); }
}
  
</style>
</head>

<body>

<div class="container">
  <div class="card" id="card">

    <!-- ADD YOUR PHOTO HERE -->
   <img id="photo" src="photo.jpg" />

    <h1 id="question">Are you ready for your birthday surprise? 🎁</h1>

    <button class="yes" onclick="next(true)">Yes 😍</button>
    <button class="no" id="noBtn" onmouseover="moveNo()">No 🙄</button>

  </div>
</div>

<script>
let step = 0;

/* QUESTIONS */
function next(ans){
  const q = document.getElementById("question");

  if(step === 0){
    q.innerText = "Do you agree I am the BEST boyfriend ever? 😏";
    step++;
  }

  else if(step === 1){
    q.innerText = "Should I get unlimited hugs today? 🤗";
    step++;
  }

  else if(step === 2){
    q.innerText = "Last chance… do you love me? ❤️";
    step++;
  }

  else {
    showFinal();
  }
}

/* FINAL SCREEN */
function showFinal(){
  document.getElementById("card").innerHTML = `
    <h1>🎂 HAPPY BIRTHDAY BABY ❤️</h1>
    <p>You are stuck with me forever 😌</p>
    <p>I love you more than food... and that's serious 😤</p>
  `;
  confetti();
}
/* Floating hearts */
function createHearts(){
  const hearts = document.getElementById("hearts");

  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.innerText = "💖";
    hearts.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 500);
}

/* RUNAWAY NO BUTTON 😈 */
function moveNo(){
  const btn = document.getElementById("noBtn");
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;
  btn.style.transform = `translate(${x}px, ${y}px)`;
}

/* CONFETTI */
function confetti() {
  for (let i = 0; i < 150; i++) {
    let c = document.createElement("div");
    c.className = "confetti";

    // Random position
    c.style.left = Math.random() * 100 + "vw";

    // Random color
    c.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;

    // Random size
    c.style.width = (Math.random() * 8 + 4) + "px";
    c.style.height = (Math.random() * 12 + 6) + "px";

    // Random fall duration
    c.style.animationDuration = (Math.random() * 3 + 2) + "s";

    // Random delay
    c.style.animationDelay = Math.random() * 2 + "s";

    // Slight horizontal movement
    c.style.transform = `translateX(${Math.random() * 50 - 25}px)`;

    document.body.appendChild(c);

    // Remove after animation
    setTimeout(() => c.remove(), 5000);
  }
}
</script>

</body>
</html>
