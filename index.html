<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  color: white;
  text-align: center;
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 22px;
}

button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes { background: #00c853; color: white; }
.no { background: #ff1744; color: white; }

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

/* Confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background: yellow;
  top: -10px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="container">
  <div class="card" id="card">
    <h1 id="question">Are you ready for your birthday surprise? 🎁</h1>
    <button class="yes" onclick="next(true)">Yes</button>
    <button class="no" onclick="next(false)">No</button>
  </div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>
let step = 0;

function next(ans) {
  const q = document.getElementById("question");

  if(step === 0){
    q.innerText = ans ? "Do you think you're special? 😏" : "Wrong answer 😤 try again!";
    step++;
  }

  else if(step === 1){
    q.innerText = ans ? "Should we celebrate BIG today? 🎉" : "No is not an option 😡";
    step++;
  }

  else if(step === 2){
    q.innerText = ans ? "Final question… Are you ready? ❤️" : "Okay okay... one more chance 😅";
    step++;
  }

  else {
    showFinal();
  }
}

function showFinal(){
  document.getElementById("card").innerHTML = `
    <h1>🎂 HAPPY BIRTHDAY ❤️</h1>
    <p>You make life beautiful ✨</p>
    <p>Hope all your wishes come true 🥳</p>
  `;

  startConfetti();
  document.getElementById("music").play();
}

/* Floating hearts */
function createHearts(){
  const hearts = document.getElementById("hearts");

  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.innerText = "💖";
    hearts.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 500);
}

/* Confetti */
function startConfetti(){
  for(let i=0;i<100;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
  }
}

createHearts();
</script>

</body>
</html>
